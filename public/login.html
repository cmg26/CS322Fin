<!DOCTYPE html>
<html lang="en">
<head>
   <title>FutureSelf - Log In</title>
   <link rel="stylesheet" href="styles.css">
</head>
<body>

   <div class="container">

   <p><a href="index.html">Back to Home</a></p>

   <h1>Log In</h1>
   <p>Welcome back. Log in to write a letter or share your story.</p>

   <p id="msg" style="color:red"></p>

   <form action="/login" method="POST">

      <div>
         <label for="email">Email address:</label>
         <input type="email" id="email" name="email" required>
      </div>

      <br>

      <div>
         <label for="password">Password:</label>
         <input type="password" id="password" name="password" required>
      </div>

      <br>

      <div>
         <input type="submit" value="Log In">
      </div>

   </form>

   <p>Don't have an account? <a href="register.html">Sign up here.</a></p>

   <script>
     const params = new URLSearchParams(window.location.search);
     const msg = document.getElementById('msg');
     if (params.get('error')) { msg.style.color = 'red'; msg.textContent = params.get('error'); }
     if (params.get('success')) { msg.style.color = 'green'; msg.textContent = params.get('success'); }
   </script>
</div>
</body>
</html>
